<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Menghubungi Transvision via WhatsApp...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(37,211,102,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-wrap svg {
      width: 44px;
      height: 44px;
      fill: #fff;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(37,211,102,0.3); }
      50%       { box-shadow: 0 0 50px rgba(37,211,102,0.6); }
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #f0f0f0;
    }

    p {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37,211,102,0.55);
    }

    .countdown {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #555;
    }

    .countdown span {
      color: #25D366;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <!-- WhatsApp icon (official SVG shape, no branding text) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2zm5.52 14.12c-.23.65-1.35 1.24-1.85 1.32-.47.08-1.07.11-1.73-.11-.4-.13-.91-.3-1.57-.59-2.76-1.19-4.56-3.97-4.7-4.15-.13-.18-1.1-1.46-1.1-2.79s.7-1.98.94-2.25c.24-.27.53-.34.7-.34l.51.01c.16 0 .38-.06.59.46.22.54.74 1.81.81 1.94.07.13.11.29.02.46-.09.18-.14.29-.27.45-.13.16-.28.36-.4.48-.13.13-.27.28-.12.54.15.27.68 1.12 1.46 1.81 1 .89 1.84 1.16 2.1 1.29.27.13.42.11.58-.07.16-.18.67-.78.85-1.05.18-.27.36-.22.61-.13.25.09 1.57.74 1.84.88.27.13.45.2.52.31.07.11.07.64-.16 1.29z"/>
      </svg>
    </div>

    <h1>Menghubungi Transvision</h1>
    <p>Anda akan diarahkan ke WhatsApp untuk berbicara dengan tim layanan kami.</p>

    <a id="wa-link" href="#" class="btn">Buka WhatsApp Sekarang</a>

    <p class="countdown">Mengalihkan otomatis dalam <span id="timer">3</span> detik...</p>
  </div>

  <script>
    (function () {
      // Read phone & text from query string, fallback to default
      var params  = new URLSearchParams(window.location.search);
      var phone   = params.get('phone') || '6281273220030';
      var text    = params.get('text')  || 'Mohon informasi detail mengenai Produk TransVision?';

      // Build clean wa.me URL
      var waUrl   = 'https://wa.me/' + encodeURIComponent(phone.replace(/\D/g, '')) +
                    '?text=' + encodeURIComponent(text);

      document.getElementById('wa-link').href = waUrl;

      // Countdown redirect
      var seconds = 3;
      var timerEl = document.getElementById('timer');
      var interval = setInterval(function () {
        seconds--;
        timerEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = waUrl;
        }
      }, 1000);
    })();
  </script>
</body>
</html>
